<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İlk 11</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&family=Archivo:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --grass1:#1b6b2f; --grass2:#155527; --line:rgba(255,255,255,.55);
    --neon:#d4ff3f; --ink:#0a140c; --panel:#0e1c12; --panel2:#13261a; --border:#234029;
    --c1:#fde100; --c2:#0a1b4d; --text:#10233f; --pat:stripes;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Barlow Condensed',sans-serif;
    background:
      radial-gradient(circle at 20% -10%,#1a3a22,transparent 50%),
      radial-gradient(circle at 80% 0%,#10261a,transparent 45%),
      #060b08;
    color:#eafbe6; min-height:100vh; padding:22px 14px 70px;
    display:flex; flex-direction:column; align-items:center;
  }
  .app{width:min(1080px,100%); display:flex; flex-direction:column; align-items:center}

  /* TOP BAR */
  .topbar{width:100%; display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap}
  .brand{display:flex; align-items:center; gap:12px}
  .logo{width:42px;height:42px;border-radius:11px;
    background:linear-gradient(135deg,var(--c1) 50%,var(--c2) 50%);
    border:1.5px solid rgba(255,255,255,.35); box-shadow:0 6px 18px rgba(0,0,0,.4)}
  .brand .t{display:flex;flex-direction:column;line-height:1}
  #teamTitle{font-family:'Archivo',sans-serif; font-weight:800; font-size:clamp(1.2rem,3.6vw,1.7rem); letter-spacing:.5px; color:#fff}
  #formLabel{color:#7fae84; font-size:.74rem; letter-spacing:2px; text-transform:uppercase; margin-top:3px}
  .langwrap{position:relative}
  .langtrigger{display:flex;align-items:center;gap:7px;height:46px;padding:0 13px;border-radius:12px;background:var(--panel);
    border:1px solid var(--border);cursor:pointer;transition:.2s;color:#eafbe6;font-family:'Barlow Condensed'}
  .langtrigger:hover{border-color:var(--neon);box-shadow:0 0 12px rgba(212,255,63,.2);color:var(--neon)}
  .langtrigger .globe{width:19px;height:19px;display:block;flex:none}
  .langtrigger .cur{font-family:'Bebas Neue';font-size:1.05rem;letter-spacing:1px}
  .langtrigger .chev{font-size:.65rem;opacity:.6;transition:.2s}
  .langtrigger.open .chev{transform:rotate(180deg)}
  .langmenu{position:absolute;top:54px;right:0;background:linear-gradient(180deg,var(--panel2),var(--panel));
    border:1px solid var(--border);border-radius:14px;padding:8px;min-width:190px;z-index:60;
    box-shadow:0 18px 50px rgba(0,0,0,.6);opacity:0;transform:translateY(-8px) scale(.97);
    pointer-events:none;transition:.18s}
  .langmenu.open{opacity:1;transform:none;pointer-events:auto}
  .langmenu .mtitle{font-size:.64rem;letter-spacing:1.5px;color:#7fae84;text-transform:uppercase;padding:6px 10px 8px}
  .langmenu button{display:flex;align-items:center;justify-content:space-between;width:100%;background:none;border:none;
    color:#eafbe6;font-family:'Barlow Condensed';font-size:1rem;padding:9px 11px;border-radius:9px;cursor:pointer;
    letter-spacing:.4px;transition:.12s;height:auto}
  .langmenu button:hover{background:rgba(255,255,255,.05)}
  .langmenu button.active{background:var(--neon);color:var(--ink);font-weight:700}
  .langmenu button .code{font-family:'Bebas Neue';font-size:.9rem;opacity:.7}
  .langmenu button.active .code{opacity:1}

  .controls{display:flex; gap:12px; flex-wrap:wrap; justify-content:center; align-items:flex-end; margin-bottom:22px; width:100%}
  .ctrl label{font-size:.68rem; letter-spacing:1.2px; color:#9fc9a3; display:block; margin-bottom:5px; text-transform:uppercase}
  select,button,input[type=text]{
    font-family:'Barlow Condensed',sans-serif; font-size:1rem; letter-spacing:.5px;
    background:var(--panel); color:#eafbe6; border:1px solid var(--border);
    padding:9px 12px; border-radius:10px; transition:.2s; height:42px;}
  select,button{cursor:pointer}
  select:hover,button:hover,input:focus{border-color:var(--neon); box-shadow:0 0 12px rgba(212,255,63,.2)}
  input:focus{outline:none}
  button.primary{background:var(--neon); color:var(--ink); font-weight:700; border:none}
  button.kitBtn{background:linear-gradient(180deg,var(--panel2),var(--panel)); border:1px solid var(--border); display:flex; align-items:center; gap:7px}
  button.saveBtn{background:linear-gradient(180deg,#1a3a22,#102a18); border:1px solid #2f6b3f; color:#d4ffce; display:flex; align-items:center; gap:7px; font-weight:600}
  button.saveBtn:hover{border-color:var(--neon)}

  .stage{display:flex; gap:22px; width:100%; justify-content:center; align-items:flex-start; flex-wrap:wrap}

  /* PITCH */
  .pitch{position:relative; width:min(440px,92vw); aspect-ratio:68/100;
    border:2px solid var(--line); border-radius:10px;
    box-shadow:0 30px 80px rgba(0,0,0,.7), inset 0 0 80px rgba(0,0,0,.45); overflow:hidden; flex:none;}
  .pitch.grass-stripes{background:repeating-linear-gradient(0deg,var(--grass1) 0 10%,var(--grass2) 10% 20%)}
  .pitch.grass-vstripes{background:repeating-linear-gradient(90deg,var(--grass1) 0 8.33%,var(--grass2) 8.33% 16.66%)}
  .pitch.grass-checker{background:repeating-linear-gradient(0deg,rgba(255,255,255,.045) 0 10%,transparent 10% 20%),repeating-linear-gradient(90deg,var(--grass1) 0 8.33%,var(--grass2) 8.33% 16.66%)}
  .pitch.grass-mow{background:repeating-linear-gradient(115deg,var(--grass1) 0 9%,var(--grass2) 9% 18%)}
  .pitch.grass-emerald{background:repeating-linear-gradient(0deg,#1f7d38 0 10%,#176b2e 10% 20%)}
  .pitch.grass-dark{background:repeating-linear-gradient(0deg,#0f3d1c 0 10%,#0b3016 10% 20%)}
  .pitch::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 50% 22%,rgba(255,255,255,.10),transparent 55%);z-index:0;pointer-events:none}
  .pitch::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 42%,transparent 48%,rgba(0,0,0,.5));pointer-events:none}
  .mark{position:absolute; border:2px solid var(--line)}
  .center-line{top:50%;left:0;width:100%;height:0;border:none;border-top:2px solid var(--line)}
  .center-circle{top:50%;left:50%;width:28%;aspect-ratio:1;transform:translate(-50%,-50%);border-radius:50%}
  .center-dot{top:50%;left:50%;width:6px;height:6px;background:var(--line);border-radius:50%;transform:translate(-50%,-50%);border:none}
  .box-bottom{bottom:0;left:50%;width:56%;height:15%;transform:translateX(-50%);border-bottom:none}
  .six-bottom{bottom:0;left:50%;width:28%;height:6.5%;transform:translateX(-50%);border-bottom:none}
  .box-top{top:0;left:50%;width:56%;height:15%;transform:translateX(-50%);border-top:none}
  .six-top{top:0;left:50%;width:28%;height:6.5%;transform:translateX(-50%);border-top:none}

  .player{position:absolute; transform:translate(-50%,-50%); display:flex; flex-direction:column; align-items:center;
    cursor:grab; touch-action:none; user-select:none; z-index:5; width:96px; transition:transform .12s}
  .player:active{cursor:grabbing}
  .jwrap{position:relative;display:flex;align-items:center;justify-content:center}
  .jersey{width:46px;height:46px;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;
    border:2px solid rgba(255,255,255,.9);box-shadow:0 4px 14px rgba(0,0,0,.6);min-width:46px;overflow:hidden;transition:.15s}
  .player:hover .jersey{border-color:var(--neon);box-shadow:0 4px 18px rgba(212,255,63,.35)}
  .flag{position:absolute;top:-4px;right:-6px;z-index:6;width:22px;height:22px;border-radius:50%;
    background:#0e1c12;border:1.5px solid rgba(255,255,255,.85);box-shadow:0 2px 6px rgba(0,0,0,.5);
    display:flex;align-items:center;justify-content:center;font-size:13px;line-height:1;overflow:hidden;pointer-events:none}
  .flag.empty{font-size:11px;color:#6f9974;background:rgba(14,28,18,.85)}
  .num{position:relative;z-index:2;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.94);color:#10233f;
    display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1.15rem;line-height:1;
    box-shadow:0 1px 4px rgba(0,0,0,.35);padding-top:2px}
  .kit-solid .jersey{background:var(--c1)}
  .kit-stripes .jersey{background:repeating-linear-gradient(90deg,var(--c1) 0 6px,var(--c2) 6px 12px)}
  .kit-hoops .jersey{background:repeating-linear-gradient(0deg,var(--c1) 0 6px,var(--c2) 6px 12px)}
  .kit-halves .jersey{background:linear-gradient(90deg,var(--c1) 50%,var(--c2) 50%)}
  .kit-sash .jersey{background:linear-gradient(115deg,var(--c1) 38%,var(--c2) 38%,var(--c2) 62%,var(--c1) 62%)}
  .kit-sleeves .jersey{background:linear-gradient(90deg,var(--c2) 20%,var(--c1) 20%,var(--c1) 80%,var(--c2) 80%)}
  .name{margin-top:5px;font-size:.74rem;letter-spacing:.2px;font-weight:600;background:rgba(6,11,8,.92);padding:3px 8px;
    border-radius:6px;color:#fff;text-align:center;
    max-width:108px;min-width:46px;min-height:20px;line-height:1.12;overflow-wrap:break-word;word-break:break-word;
    box-shadow:0 2px 6px rgba(0,0,0,.45);pointer-events:none}
  .player:hover{z-index:15}
  .player:hover .name{position:relative;z-index:30}
  /* FLAG PICKER */
  .flagpick{position:fixed;z-index:200;background:linear-gradient(180deg,var(--panel2),var(--panel));
    border:1px solid var(--border);border-radius:12px;padding:10px;width:240px;box-shadow:0 18px 50px rgba(0,0,0,.7);display:none}
  .flagpick.open{display:block}
  .flagpick input{width:100%;height:36px;margin-bottom:8px;background:rgba(6,11,8,.5);border:1px solid var(--border);
    color:#eafbe6;border-radius:8px;padding:6px 10px;font-family:'Barlow Condensed';outline:none}
  .flagpick input:focus{border-color:var(--neon)}
  .flaggrid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;max-height:200px;overflow-y:auto}
  .flaggrid button{background:none;border:1px solid transparent;border-radius:8px;font-size:20px;padding:5px 0;cursor:pointer;
    line-height:1;transition:.12s;height:auto}
  .flaggrid button:hover{background:rgba(255,255,255,.06);border-color:var(--border)}
  .flaggrid .clearflag{grid-column:1/-1;font-size:.78rem;color:#9fc9a3;letter-spacing:.5px;padding:6px;font-family:'Barlow Condensed'}

  /* PLAYER CARD MODAL */
  .pcard-overlay{position:fixed;inset:0;z-index:300;background:rgba(3,6,4,.72);backdrop-filter:blur(6px);
    display:none;align-items:center;justify-content:center;padding:20px}
  .pcard-overlay.open{display:flex;animation:pcfade .2s ease}
  @keyframes pcfade{from{opacity:0}to{opacity:1}}
  .pcard{width:min(420px,100%);max-height:88vh;overflow-y:auto;border-radius:22px;position:relative;
    background:linear-gradient(180deg,#142318,#0a130d);border:1px solid #2c4a32;
    box-shadow:0 40px 120px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.05);
    animation:pcrise .26s cubic-bezier(.2,.8,.3,1);
    scrollbar-width:thin;scrollbar-color:#2f4a36 transparent}
  .pcard::-webkit-scrollbar{width:8px}
  .pcard::-webkit-scrollbar-thumb{background:#2f4a36;border-radius:20px;border:2px solid transparent;background-clip:padding-box}
  @keyframes pcrise{from{opacity:0;transform:translateY(24px) scale(.96)}to{opacity:1;transform:none}}
  .pcard-x{position:absolute;top:14px;right:14px;z-index:5;background:rgba(0,0,0,.3);border:1px solid var(--border);
    color:#cfeccf;width:34px;height:34px;border-radius:50%;font-size:1.4rem;line-height:1;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:.15s}
  .pcard-x:hover{border-color:#ff7a7a;color:#ff7a7a}
  .pcard-hero{position:relative;padding:34px 0 26px;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 30%,rgba(212,255,63,.12),transparent 62%);
    border-bottom:1px solid var(--border)}
  .pcard-jersey{width:104px;height:104px;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;
    border:3px solid rgba(255,255,255,.9);box-shadow:0 10px 30px rgba(0,0,0,.55);overflow:hidden}
  .pcard-num{position:relative;z-index:2;width:68px;height:68px;border-radius:50%;background:rgba(255,255,255,.95);color:#10233f;
    display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:2.6rem;line-height:1;padding-top:4px}
  .kit-solid .pcard-jersey{background:var(--c1)}
  .kit-stripes .pcard-jersey{background:repeating-linear-gradient(90deg,var(--c1) 0 13px,var(--c2) 13px 26px)}
  .kit-hoops .pcard-jersey{background:repeating-linear-gradient(0deg,var(--c1) 0 13px,var(--c2) 13px 26px)}
  .kit-halves .pcard-jersey{background:linear-gradient(90deg,var(--c1) 50%,var(--c2) 50%)}
  .kit-sash .pcard-jersey{background:linear-gradient(115deg,var(--c1) 38%,var(--c2) 38%,var(--c2) 62%,var(--c1) 62%)}
  .kit-sleeves .pcard-jersey{background:linear-gradient(90deg,var(--c2) 20%,var(--c1) 20%,var(--c1) 80%,var(--c2) 80%)}
  .pcard-flag{position:absolute;top:30px;right:calc(50% - 78px);width:40px;height:40px;border-radius:50%;cursor:pointer;
    background:#0e1c12;border:2px solid rgba(255,255,255,.85);box-shadow:0 4px 12px rgba(0,0,0,.5);
    display:flex;align-items:center;justify-content:center;font-size:22px;line-height:1;transition:.15s;padding:0}
  .pcard-flag:hover{transform:scale(1.1);border-color:var(--neon)}
  .pcard-flag span{font-size:20px}
  .pcard-fields{padding:22px 24px 8px}
  .pcl{display:block;font-size:.7rem;letter-spacing:1.5px;text-transform:uppercase;color:#9fc9a3;margin:0 0 6px;font-family:'Barlow Condensed'}
  .pcard-fields input{width:100%;height:44px;margin-bottom:16px;background:rgba(6,11,8,.5);border:1px solid var(--border);
    border-radius:11px;color:#eafbe6;padding:8px 14px;font-family:'Barlow Condensed';font-size:1.1rem;outline:none;transition:.15s}
  .pcard-fields input:focus{border-color:var(--neon);box-shadow:0 0 0 3px rgba(212,255,63,.12)}
  .pcard-subs{padding:6px 24px 26px;border-top:1px solid var(--border);margin-top:6px}
  .pcard-subhead{display:flex;align-items:center;justify-content:space-between;margin:18px 0 12px}
  .pcard-subhead span{font-family:'Archivo';font-weight:800;letter-spacing:.5px;color:#fff;font-size:1rem}
  .pcard-addsub{background:rgba(212,255,63,.1);border:1px solid rgba(212,255,63,.3);color:var(--neon);
    height:34px;padding:0 14px;border-radius:9px;font-family:'Barlow Condensed';font-size:.92rem;cursor:pointer;letter-spacing:.4px;transition:.15s}
  .pcard-addsub:hover{background:rgba(212,255,63,.18)}
  .pcsub{display:flex;align-items:center;gap:9px;padding:7px;border-radius:10px;background:rgba(255,255,255,.03);margin-bottom:8px}
  .pcsub .ar{flex:none;color:var(--c1);opacity:.7;-webkit-text-stroke:.2px rgba(0,0,0,.3)}
  .pcsub input{flex:1;min-width:0;height:38px;background:rgba(6,11,8,.5);border:1px solid var(--border);border-radius:9px;
    color:#eafbe6;padding:6px 11px;font-family:'Barlow Condensed';font-size:1rem;outline:none}
  .pcsub input:focus{border-color:var(--neon)}
  .pcsub .eye{flex:none;background:none;border:1px solid var(--border);color:#9fc9a3;width:36px;height:36px;border-radius:9px;
    font-size:.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
  .pcsub .eye.on{background:var(--neon);color:var(--ink);border-color:var(--neon)}
  .pcsub .del{flex:none;background:none;border:none;color:#7d9a82;font-size:1.3rem;cursor:pointer;padding:0 5px;line-height:1}
  .pcsub .del:hover{color:#ff7a7a}
  .pcsub-empty{font-size:.85rem;color:#5c7d61;font-style:italic;padding:4px 2px}
  .linktag{margin-top:3px;font-size:.62rem;letter-spacing:.4px;color:var(--c1);opacity:.85;display:none;align-items:center;gap:3px;
    background:rgba(6,11,8,.55);padding:1px 6px;border-radius:10px;-webkit-text-stroke:.2px rgba(0,0,0,.4)}
  .player.has-sub .linktag{display:flex}

  /* SQUAD PANEL */
  .subpanel{flex:1; min-width:300px; max-width:430px; background:linear-gradient(180deg,var(--panel2),var(--panel));
    border:1px solid var(--border); border-radius:14px; padding:18px; align-self:stretch; max-height:740px; overflow-y:auto;
    scrollbar-width:thin; scrollbar-color:#2f4a36 transparent}
  .subpanel::-webkit-scrollbar{width:8px}
  .subpanel::-webkit-scrollbar-track{background:transparent;margin:8px 0}
  .subpanel::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#3a5e42,#24382a);border-radius:20px;border:2px solid transparent;background-clip:padding-box}
  .subpanel::-webkit-scrollbar-thumb:hover{background:linear-gradient(180deg,var(--neon),#7fae34);background-clip:padding-box}
  .subpanel h3{font-family:'Archivo',sans-serif;font-weight:800;letter-spacing:1px;color:#fff;font-size:1.05rem;
    margin-bottom:3px;display:flex;align-items:center;gap:8px}
  .subpanel .desc{color:#7fae84;font-size:.74rem;letter-spacing:.5px;margin-bottom:14px;line-height:1.4}
  .squad-group{border:1px solid var(--border);border-radius:11px;margin-bottom:9px;overflow:hidden;background:rgba(255,255,255,.015)}
  .starter{display:flex;align-items:center;gap:10px;padding:9px 10px;background:rgba(255,255,255,.03)}
  .badge{flex:none;width:30px;height:30px;border-radius:50%;position:relative;overflow:hidden;
    border:1.5px solid rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center}
  .badge .n{position:relative;z-index:2;width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.94);
    color:#10233f;font-family:'Bebas Neue';font-size:.78rem;display:flex;align-items:center;justify-content:center;padding-top:1px}
  .kit-solid .badge{background:var(--c1)}
  .kit-stripes .badge{background:repeating-linear-gradient(90deg,var(--c1) 0 4px,var(--c2) 4px 8px)}
  .kit-hoops .badge{background:repeating-linear-gradient(0deg,var(--c1) 0 4px,var(--c2) 4px 8px)}
  .kit-halves .badge{background:linear-gradient(90deg,var(--c1) 50%,var(--c2) 50%)}
  .kit-sash .badge{background:linear-gradient(115deg,var(--c1) 38%,var(--c2) 38%,var(--c2) 62%,var(--c1) 62%)}
  .kit-sleeves .badge{background:linear-gradient(90deg,var(--c2) 22%,var(--c1) 22%,var(--c1) 78%,var(--c2) 78%)}
  .starter .st-name{flex:1;min-width:0;font-weight:600;font-size:.96rem;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .starter .st-flag{flex:none;font-size:15px}
  .starter .addsub{flex:none;background:none;border:1px solid var(--border);color:#9fc9a3;height:28px;padding:0 9px;
    border-radius:8px;font-size:.78rem;cursor:pointer;letter-spacing:.3px;white-space:nowrap}
  .starter .addsub:hover{border-color:var(--neon);color:var(--neon)}
  .subs{padding:4px 10px 8px 10px;display:flex;flex-direction:column;gap:5px}
  .sub-row{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:8px;background:rgba(255,255,255,.02)}
  .sub-row .arrow{flex:none;color:var(--c1);font-size:.8rem;opacity:.7;-webkit-text-stroke:.2px rgba(0,0,0,.3)}
  .sub-row input{flex:1;min-width:0;height:30px;font-size:.9rem;padding:4px 8px;background:rgba(6,11,8,.5)}
  .sub-row .eye{flex:none;background:none;border:1px solid var(--border);color:#9fc9a3;width:28px;height:28px;
    border-radius:7px;font-size:.82rem;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center}
  .sub-row .eye.on{background:var(--neon);color:var(--ink);border-color:var(--neon)}
  .sub-row .del{flex:none;background:none;border:none;color:#7d9a82;font-size:1.1rem;cursor:pointer;padding:0 4px;height:auto;line-height:1}
  .sub-row .del:hover{color:#ff7a7a;box-shadow:none}
  .no-subs{font-size:.72rem;color:#5c7d61;font-style:italic;padding:2px 4px}

  .hint{margin-top:20px;color:#6f9974;font-size:.8rem;letter-spacing:.5px;text-align:center;max-width:480px;line-height:1.55}

  /* MODAL */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:30px 14px;overflow-y:auto;backdrop-filter:blur(3px)}
  .overlay.open{display:flex}
  .modal{background:linear-gradient(180deg,#13261a,#0a140c);border:1px solid var(--border);border-radius:18px;width:min(580px,100%);padding:24px}
  .modal h2{font-family:'Archivo';font-weight:800;letter-spacing:.5px;color:#fff;font-size:1.4rem;margin-bottom:4px}

const DIDX={tr:0,en:1,es:2,de:3,fr:4,pt:5,it:1};

const pitch=document.getElementById('pitch'),formSel=document.getElementById('form'),root=document.documentElement;
const benchList=document.getElementById('benchList'),teamInput=document.getElementById('teamName'),teamTitle=document.getElementById('teamTitle');
let players=[];
window._curKit=LEAGUES.tur[0];

/* hamburger language menu */
const LANG_NAMES={tr:"Türkçe",en:"English",es:"Español",de:"Deutsch",fr:"Français",pt:"Português",it:"Italiano"};
const hamburger=document.getElementById('hamburger'), langMenu=document.getElementById('langMenu');
Object.keys(I18N).forEach(l=>{
  const b=document.createElement('button'); if(l===LANG)b.classList.add('active'); b.dataset.lang=l;
  b.innerHTML='<span>'+LANG_NAMES[l]+'</span><span class="code">'+I18N[l].lang+'</span>';
  b.onclick=()=>{LANG=l;
    document.querySelectorAll('.langmenu button').forEach(x=>x.classList.remove('active')); b.classList.add('active');
    closeMenu(); applyLang();};
  langMenu.appendChild(b);
});
function openMenu(){hamburger.classList.add('open');langMenu.classList.add('open');}
function closeMenu(){hamburger.classList.remove('open');langMenu.classList.remove('open');}
hamburger.onclick=e=>{e.stopPropagation();langMenu.classList.contains('open')?closeMenu():openMenu();};
document.addEventListener('click',e=>{if(!langMenu.contains(e.target)&&e.target!==hamburger)closeMenu();});

function t(k){return I18N[LANG][k];}
function applyLang(){
  document.documentElement.lang=LANG;
  const lc=document.getElementById('langCur'); if(lc)lc.textContent=I18N[LANG].lang;
  document.querySelectorAll('[data-t]').forEach(el=>{const k=el.getAttribute('data-t'); if(I18N[LANG][k])el.textContent=I18N[LANG][k];});
  if(teamInput.value===''||isDefaultTeam(teamInput.value)){teamInput.value=t('defTeam');}
  teamTitle.textContent=(teamInput.value||t('defTeam')).toUpperCase();
  document.getElementById('formLabel').textContent=formSel.value+' '+t('formSuffix');
  // refresh names that are still default position labels
  refreshPositionTexts();
  renderTabs(); if(overlay.classList.contains('open'))renderGrid();
}
function isDefaultTeam(v){return Object.values(I18N).some(x=>x.defTeam===v);}

teamInput.addEventListener('input',()=>teamTitle.textContent=(teamInput.value||t('defTeam')).toUpperCase());

function applyKit(k){
  root.style.setProperty('--c1',k.c1); root.style.setProperty('--c2',k.c2); root.style.setProperty('--text',k.text);
  window._curKit=k;
  players.forEach(p=>{['solid','stripes','hoops','halves','sash','sleeves'].forEach(x=>p.classList.remove('kit-'+x)); p.classList.add('kit-'+k.p);});
  if(typeof subsData!=='undefined'&&subsData.length)renderSquad();
}

let playerData=[];
function build(f){
  players.forEach(p=>p.remove()); players=[];
  if(!playerData.length||playerData.length!==11){
    playerData=FORMATIONS[f].map((_,i)=>({num:String(NUMS[i]),name:t('pos')[i],isPos:true,flag:''}));
  }
  document.getElementById('formLabel').textContent=f+' '+t('formSuffix');
  FORMATIONS[f].forEach((p,i)=>{
    const el=document.createElement('div');
    el.className='player kit-'+window._curKit.p; el.dataset.idx=i;
    el.style.left=p[0]+'%'; el.style.top=p[1]+'%';
    el.innerHTML='<div class="jwrap"><div class="jersey"><div class="num">'+playerData[i].num+'</div></div>'+
      '<div class="flag'+(playerData[i].flag?'':' empty')+'">'+(playerData[i].flag||'+')+'</div></div>'+
      '<div class="name">'+(playerData[i].name||t('namePh'))+'</div>'+
      '<div class="linktag">🔁 <span class="lt-name"></span></div>';
    pitch.appendChild(el); makeDraggable(el,i); players.push(el);
  });
  buildBench(); applyKit(window._curKit); syncLinks();
}
function renderPlayer(i){
  const el=players[i],d=playerData[i];
  el.querySelector('.num').textContent=d.num;
  el.querySelector('.name').textContent=d.name||t('namePh');
  const fl=el.querySelector('.flag');
  if(d.flag){fl.textContent=d.flag;fl.classList.remove('empty');}else{fl.textContent='+';fl.classList.add('empty');}

}
function refreshPositionTexts(){

function caretEnd(el){const r=document.createRange();r.selectNodeContents(el);r.collapse(false);const s=getSelection();s.removeAllRanges();s.addRange(r);}

/* data model: subsData[starterIndex] = [{name, show}, ...] */
let subsData=[];
function buildBench(){
  if(!subsData.length||subsData.length!==11){subsData=players.map(()=>[]);}
  renderSquad();
}

function starterLabel(i){
  const pl=players[i]; if(!pl)return '';
  const nm=pl.querySelector('.name').textContent.trim()||t('pos')[i];
  return nm;
}
function starterNum(i){const pl=players[i];return pl?pl.querySelector('.num').textContent.trim():'';}
function starterFlag(i){const pl=players[i];if(!pl)return '';const f=pl.querySelector('.flag');return f.classList.contains('empty')?'':f.textContent;}
function updateHeader(i){
  const g=benchList.children[i]; if(!g)return;
  g.querySelector('.badge .n').textContent=starterNum(i);
  g.querySelector('.st-name').textContent=starterLabel(i);
  let fl=g.querySelector('.st-flag'); const flag=starterFlag(i);
  if(flag){ if(!fl){fl=document.createElement('span');fl.className='st-flag';g.querySelector('.badge').after(fl);} fl.textContent=flag; }
  else if(fl){fl.remove();}
}

function renderSquad(){
  benchList.innerHTML='';
  players.forEach((pl,i)=>{
    const g=document.createElement('div'); g.className='squad-group';
    // starter header
    const head=document.createElement('div'); head.className='starter kit-'+window._curKit.p;
    head.innerHTML='<div class="badge"><span class="n">'+starterNum(i)+'</span></div>'+
      (starterFlag(i)?'<span class="st-flag">'+starterFlag(i)+'</span>':'')+
      '<span class="st-name">'+starterLabel(i)+'</span>'+
      '<button class="addsub">'+t('addSub')+'</button>';
    head.querySelector('.addsub').onclick=()=>{subsData[i].push({name:'',show:false}); renderSquad();
      // focus the new input
      setTimeout(()=>{const ins=benchList.children[i].querySelectorAll('.sub-row input');if(ins.length)ins[ins.length-1].focus();},30);};
    g.appendChild(head);
    // subs
    const subs=document.createElement('div'); subs.className='subs';
    if(subsData[i].length===0){
      const ns=document.createElement('div'); ns.className='no-subs'; ns.textContent=t('noSubs'); subs.appendChild(ns);
    }
    subsData[i].forEach((s,j)=>{
      const row=document.createElement('div'); row.className='sub-row';
      row.innerHTML='<span class="arrow">↳</span>'+
        '<input type="text" maxlength="24" placeholder="'+t('namePh')+'" value="'+s.name.replace(/"/g,'&quot;')+'">'+
        '<button class="eye'+(s.show?' on':'')+'" title="Sahada göster / Show on pitch">👁</button>'+
        '<button class="del" title="Sil / Delete">×</button>';
      const inp=row.querySelector('input'), eye=row.querySelector('.eye'), del=row.querySelector('.del');
      inp.addEventListener('input',()=>{s.name=inp.value; syncLinks();});
      eye.onclick=()=>{s.show=!s.show; eye.classList.toggle('on',s.show); syncLinks();};
      del.onclick=()=>{subsData[i].splice(j,1); renderSquad();};
      subs.appendChild(row);
    });
    g.appendChild(subs);
    benchList.appendChild(g);
  });
  syncLinks();
}

function syncLinks(){
  players.forEach((pl,i)=>{
    const shown=(subsData[i]||[]).filter(s=>s.show && s.name.trim()).map(s=>s.name.trim());
    const tag=pl.querySelector('.linktag'), ltn=pl.querySelector('.lt-name');
    if(shown.length){pl.classList.add('has-sub'); ltn.textContent=shown.join(', ');}
    else{pl.classList.remove('has-sub');}
  });
}

function makeDraggable(el,idx){
  let dragging=false,moved=false,sx=0,sy=0;
  const start=e=>{dragging=true;moved=false;el.style.zIndex=20;
    const tt=e.touches?e.touches[0]:e; sx=tt.clientX; sy=tt.clientY; e.preventDefault();};
  const move=e=>{if(!dragging)return; const tt=e.touches?e.touches[0]:e;
    if(Math.abs(tt.clientX-sx)>5||Math.abs(tt.clientY-sy)>5)moved=true;
    const r=pitch.getBoundingClientRect();
    let x=(tt.clientX-r.left)/r.width*100,y=(tt.clientY-r.top)/r.height*100;
    x=Math.max(7,Math.min(93,x)); y=Math.max(5,Math.min(95,y));
    el.style.left=x+'%'; el.style.top=y+'%';};
  const end=()=>{if(dragging&&!moved)openPlayerCard(idx); dragging=false; el.style.zIndex=5;};
  el.addEventListener('mousedown',start); el.addEventListener('touchstart',start,{passive:false});
  window.addEventListener('mousemove',move); window.addEventListener('touchmove',move,{passive:false});
  window.addEventListener('mouseup',end); window.addEventListener('touchend',end);
}

const flagPick=document.getElementById('flagPick'),flagSearch=document.getElementById('flagSearch'),flagGrid=document.getElementById('flagGrid');

function renderFlags(q){
  q=(q||'').toLowerCase().trim();
  flagGrid.innerHTML='';
  const clr=document.createElement('button'); clr.className='clearflag'; clr.textContent='✕ '+(LANG==='tr'?'Bayrağı kaldır':LANG==='es'?'Quitar bandera':LANG==='de'?'Flagge entfernen':LANG==='fr'?'Retirer le drapeau':LANG==='pt'?'Remover bandeira':LANG==='it'?'Rimuovi bandiera':'Remove flag');
  clr.onclick=()=>{if(flagCb)flagCb(''); closeFlag();}; flagGrid.appendChild(clr);
  COUNTRIES.filter(c=>!q||c[1].toLowerCase().includes(q)).forEach(c=>{
    const b=document.createElement('button'); b.textContent=c[0]; b.title=c[1].split(' ')[0];
    b.onclick=()=>{if(flagCb)flagCb(c[0]); closeFlag();}; flagGrid.appendChild(b);
  });
}
function openFlagPickAt(rect,cb){
  flagCb=cb;
  flagPick.classList.add('open');
  let x=rect.left, y=rect.bottom+6;
  const pw=240, ph=250;
  if(x+pw>window.innerWidth-10)x=window.innerWidth-pw-10;
  if(y+ph>window.innerHeight-10)y=rect.top-ph-6;
  if(y<10)y=10;
  flagPick.style.left=Math.max(10,x)+'px'; flagPick.style.top=y+'px';
  flagSearch.value=''; renderFlags(''); setTimeout(()=>flagSearch.focus(),50);
}
function closeFlag(){flagPick.classList.remove('open'); flagCb=null;}
flagSearch.addEventListener('input',()=>renderFlags(flagSearch.value));
document.addEventListener('click',e=>{if(flagPick.classList.contains('open')&&!flagPick.contains(e.target)&&!e.target.closest('.pcard-flag'))closeFlag();});

const pcOverlay=document.getElementById('pcardOverlay'),pcEl=document.getElementById('pcard');
let pcIdx=null;
function openPlayerCard(i){
  pcIdx=i; const d=playerData[i];
  pcEl.className='pcard kit-'+window._curKit.p;
  document.getElementById('pcNumBig').textContent=d.num;
  document.getElementById('pcNum').value=d.num;
  document.getElementById('pcName').value=d.isPos?'':d.name;
  document.getElementById('pcName').placeholder=t('pos')[i];
  document.getElementById('pcFlagEmoji').textContent=d.flag||'+';
  renderPcSubs();
  pcOverlay.classList.add('open');
  setTimeout(()=>document.getElementById('pcName').focus(),60);
}
function closePlayerCard(){pcOverlay.classList.remove('open'); pcIdx=null;}
document.getElementById('pcardClose').onclick=closePlayerCard;

document.getElementById('pcNum').addEventListener('input',function(){
  this.value=this.value.replace(/[^0-9]/g,'').slice(0,2);

  renderPlayer(pcIdx);
});
document.getElementById('pcName').addEventListener('input',function(){
  playerData[pcIdx].name=this.value; playerData[pcIdx].isPos=(this.value.trim()==='');
  if(playerData[pcIdx].isPos)playerData[pcIdx].name=t('pos')[pcIdx];
  renderPlayer(pcIdx);
});
document.getElementById('pcFlag').onclick=function(e){

function renderPcSubs(){
  const list=document.getElementById('pcSubList'); list.innerHTML='';

    const e=document.createElement('div'); e.className='pcsub-empty'; e.textContent=t('noSubs'); list.appendChild(e); return;

    del.onclick=()=>{subsData[pcIdx].splice(j,1); renderPcSubs(); renderSquad();};
    list.appendChild(row);
  });
}
